name: host-tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  ctest:
    name: ctest (Ubuntu)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake ninja-build

      - name: Configure
        run: cmake -S tests -B build/host -G Ninja

      - name: Build
        run: cmake --build build/host

      - name: Run tests
        run: ctest --test-dir build/host --output-on-failure
