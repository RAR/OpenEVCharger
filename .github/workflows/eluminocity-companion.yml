name: eluminocity-companion

on:
  push:
    paths:
      - 'boards/eluminocity-ch21130/**'
      - '.github/workflows/eluminocity-companion.yml'
  pull_request:
    paths:
      - 'boards/eluminocity-ch21130/**'
      - '.github/workflows/eluminocity-companion.yml'

jobs:
  host-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: boards/eluminocity-ch21130/companion
    steps:
      - uses: actions/checkout@v4
      - name: Host unit tests
        run: make test
      - name: DcoFImage wrapper tests
        run: cd image && python3 test_wrap_dco.py
      - name: Image build script syntax
        run: cd image && sh -n build-dcofimage.sh

  cross-compile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: boards/eluminocity-ch21130/companion
    steps:
      - uses: actions/checkout@v4
      - name: Cache musl armv5te toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: /tmp/armv5l-linux-musleabi-cross.tgz
          key: musl-armv5l-cross-v1
      - name: Fetch musl armv5te toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          cd /tmp
          # musl.cc is occasionally unreachable from GitHub runners; try mirrors with retries.
          for url in \
            https://musl.cc/armv5l-linux-musleabi-cross.tgz \
            https://more.musl.cc/10/x86_64-linux-musl/armv5l-linux-musleabi-cross.tgz \
          ; do
            echo "trying $url"
            if curl -fsSL --retry 5 --retry-connrefused --retry-delay 10 --max-time 300 \
                 -o armv5l-linux-musleabi-cross.tgz "$url"; then
              echo "fetched from $url"
              exit 0
            fi
          done
          echo "all mirrors failed" >&2
          exit 1
      - name: Unpack toolchain
        run: |
          cd /tmp
          tar xzf armv5l-linux-musleabi-cross.tgz
          echo "/tmp/armv5l-linux-musleabi-cross/bin" >> "$GITHUB_PATH"
      - name: Cross-compile delta-bridge
        run: make clean && make
      - name: Verify it is a static ARM binary
        run: file delta-bridge | grep -E 'ARM.*static(-pie)? linked'
