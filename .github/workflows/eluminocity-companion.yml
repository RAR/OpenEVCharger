name: eluminocity-companion

on:
  push:
    paths:
      - 'boards/eluminocity-ch21130/**'
      - '.github/workflows/eluminocity-companion.yml'
  pull_request:
    paths:
      - 'boards/eluminocity-ch21130/**'
      - '.github/workflows/eluminocity-companion.yml'

jobs:
  host-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: boards/eluminocity-ch21130/companion
    steps:
      - uses: actions/checkout@v4
      - name: Host unit tests
        run: make test
      - name: DcoFImage wrapper tests
        run: cd image && python3 test_wrap_dco.py
      - name: Image build script syntax
        run: cd image && sh -n build-dcofimage.sh

  cross-compile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: boards/eluminocity-ch21130/companion
    steps:
      - uses: actions/checkout@v4
      # musl.cc has been wholesale-blocking GitHub Actions since 2025-05-27
      # (abuse). Build inside the muslcc/x86_64 Docker Hub image instead —
      # Docker Hub remains reachable. The image is Alpine 3.14 with an
      # unprefixed musl cross-toolchain at /bin/cc (so we invoke make with
      # CROSS="" inside the container).
      - name: Cross-compile delta-bridge (musl armv5te via Docker)
        working-directory: boards/eluminocity-ch21130/companion
        run: |
          docker run --rm -v "$PWD:/work" -w /work \
            muslcc/x86_64:armv5l-linux-musleabi \
            sh -c 'apk add --no-cache make >/dev/null && make clean && make CROSS=""'
      - name: Verify it is a static ARM binary
        working-directory: boards/eluminocity-ch21130/companion
        run: file delta-bridge | grep -E 'ARM.*static(-pie)? linked'
