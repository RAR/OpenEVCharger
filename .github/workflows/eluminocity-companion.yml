name: eluminocity-companion

on:
  push:
    paths:
      - 'boards/eluminocity-ch21130/**'
      - '.github/workflows/eluminocity-companion.yml'
  pull_request:
    paths:
      - 'boards/eluminocity-ch21130/**'
      - '.github/workflows/eluminocity-companion.yml'

jobs:
  host-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: boards/eluminocity-ch21130/companion
    steps:
      - uses: actions/checkout@v4
      - name: Host unit tests
        run: make test
      - name: DcoFImage wrapper tests
        run: cd image && python3 test_wrap_dco.py
      - name: Image build script syntax
        run: cd image && sh -n build-dcofimage.sh

  cross-compile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: boards/eluminocity-ch21130/companion
    steps:
      - uses: actions/checkout@v4
      # musl.cc has been blocking GitHub Actions wholesale since 2025-05-27
      # (abuse). Pull the toolchain out of the muslcc/x86_64 Docker Hub image
      # instead — Docker Hub remains reachable from GHA. The extracted dir is
      # cached so subsequent runs skip the docker pull.
      - name: Cache musl armv5te toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: /tmp/armv5l-linux-musleabi-cross
          key: muslcc-armv5l-linux-musleabi-v1
      - name: Extract musl toolchain from Docker Hub
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          docker create --name musl muslcc/x86_64:armv5l-linux-musleabi
          docker cp musl:/armv5l-linux-musleabi-cross /tmp/
          docker rm musl
      - name: Put toolchain on PATH
        run: echo "/tmp/armv5l-linux-musleabi-cross/bin" >> "$GITHUB_PATH"
      - name: Cross-compile delta-bridge
        run: make clean && make
      - name: Verify it is a static ARM binary
        run: file delta-bridge | grep -E 'ARM.*static(-pie)? linked'
