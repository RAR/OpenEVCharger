# OpenOCD config for GD32F205VE (512 KB flash, 128 KB RAM).
# GD32F2 is register-compatible enough with STM32F2 that the stm32f2x driver
# works for connect/halt/dump. For erase+program we use a generic flash bank
# pointing at GD32's flash controller (same registers as STM32F1's FPEC).

source [find interface/stlink.cfg]
transport select hla_swd

# GD32F205V's DBGMCU IDCODE matches STM32F1 connectivity-line family
# (DEV_ID = 0x418), and its flash controller is register-compatible with
# STM32F1 FMC. So we use target/stm32f1x.cfg, NOT stm32f2x.cfg.
# But the JTAG-DP IDCODE returns 0x1ba01477 (GD32) where stm32f1x expects
# 0x3ba00477; override CPUTAPID before sourcing.
set CHIPNAME gd32f205
set CPUTAPID 0x1ba01477

source [find target/stm32f1x.cfg]

# Slow clock for first connect; pin_probe.py confirmed reliable at 1.8 MHz
adapter speed 1000

# Override flash bank size — stm32f1x.cfg defaults to 128 KB for the F103
# medium-density part it targets; the GD32F205VG actually has 1 MB
# (chip-reported flash-size register reads 1024 KiB; lower 512 KB holds
# stock fw V1.0.066, upper 512 KB is fully erased).
flash bank gd32f205_flash stm32f1x 0x08000000 0x100000 0 0 $_TARGETNAME

# We don't have NRST wired on the bench probe — fall back to halting via the
# debug AP (CortexM SYSRESETREQ). Works for halt+program; reset_run also works.
reset_config none separate
