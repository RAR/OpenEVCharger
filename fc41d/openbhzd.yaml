# FC41D-side ESPHome firmware for OpenBHZD.
#
# Pairs with the safety-core firmware running on the GD32F205VG MCU
# (this repo's src/). The MCU drives all safety-critical work — J1772
# state machine, contactor control, fault latching, persistence,
# user I/O on the LED strip + buzzer + buttons + DIPs — and exports
# its full state and a small command surface over the binary TLV
# protocol from spec § 5 (see ../docs/protocol.md, ../src/proto/).
#
# This YAML runs on the FC41D module (Quectel BK7231N Wi-Fi/BLE chip,
# reflashed with LibreTiny+ESPHome). Job: speak TLV to the MCU,
# expose state to Home Assistant, take command requests back, and
# eventually carry OCPP / external scheduling. Nothing safety-bearing
# lives on this side — it can crash, reboot, or lose the network and
# the MCU keeps charging or faults safely on its own.
#
# Wiring (matches stock board):
#   BK7231N UART1 P11 (TX) → MCU UART4 PD2 (RX)
#   BK7231N UART1 P10 (RX) → MCU UART4 PC12 (TX)
#   GND bonded.
#
# First-flash + recovery procedure: see ../docs/fc41d-bring-up.md
# (and `boards/README.md` for the partition-shift rationale on this
# specific BK7231N board variant).

substitutions:
  device_name: openbhzd
  friendly_name: OpenBHZD EV Charger

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.f_cpu: 120000000L
    # FC41D's BK7231N has no flash encryption key set (eFuse = all zeros).
    # LibreTiny's Tuya variant pre-encrypts the image with the Tuya XOR
    # coefficient, expecting the chip to reverse it at read time. FC41D
    # doesn't, so override to zero coeffs → image written as plaintext.
    board_build.bkcrypt_coeffs: "00000000000000000000000000000000"
    build_flags:
      # The TLV channel is bursty: STATE_REPORT ≈ 36 B every 5 s, fault-
      # log dump up to ~16 × 38 B at once. 1 KB ring is comfortable
      # headroom over LibreTiny's 256 B default. ESPHome's
      # `uart.rx_buffer_size:` is silently ignored on bk72xx — the
      # Arduino Serial driver uses a compile-time-fixed
      # RingBufferN<LT_SERIAL_BUFFER_SIZE>.
      - -DLT_SERIAL_BUFFER_SIZE=1024

# Custom partition layout — `download` shifted to 0x132000 so the stock
# Quectel/Beken bootloader actually finds OTA images we write. JSON in
# ./boards/, symlinked into ~/.platformio/platforms/libretiny/boards/
# once at setup time (see boards/README.md).
bk72xx:
  board: generic-bk7231n-qfn32-quectel
  family: BK7231N

# UART2 (P0/P1) is the BK7231N's debug-pad UART; doesn't collide with
# UART1. Keep at DEBUG so unhandled TLV opcodes show up in the trace.
logger:
  level: DEBUG

# Surfaces free heap, largest free block, loop time, reset reason as
# diagnostic sensors.
debug:
  update_interval: 30s

# Wire to MCU UART4 (PC12 TX / PD2 RX).
uart:
  id: mcu_uart
  tx_pin: P11
  rx_pin: P10
  baud_rate: 115200

# In-tree component — this YAML lives in the OpenBHZD repo so the
# component is right next door, no git fetch needed. To pin a
# released ref later, switch to `type: git` with the OpenBHZD repo
# URL and a tag.
external_components:
  - source:
      type: local
      path: components
    components: [openbhzd_tlv]

openbhzd_tlv:
  id: openbhzd_mcu
  uart_id: mcu_uart
  poll_interval: 5s
  link_timeout: 15s

sensor:
  - platform: openbhzd_tlv
    cp_high_mv:
      name: "CP High"
    advertised_amps:
      name: "Advertised Amps"
    active_amps:
      name: "Active Amps"
    lifetime_kwh:
      name: "Lifetime Energy"
      # OpenBHZD persists this in W25Q session_log, monotonic across reboots.
    session_kwh:
      name: "Session Energy"
    fault_count:
      name: "Active Faults"
      entity_category: diagnostic
    # PA2 — gun-cable / J1772-handle NTC. Channel was originally
    # mislabelled "AC mains voltage" until a 2026-05-03 bench
    # experiment (grounding the front-block NTC pin) zeroed PA2,
    # confirming it as the gun thermistor. The earlier
    # "Fluke @ 123.9 V → 0.06151 V/count" calibration was a
    # coincidence — disconnected NTC pin floated at a value that
    # multiplied to a plausible mains number. Real V/I sensing
    # comes from the BL0939 metering IC at U11 (see further down).
    gun_ntc_adc_raw:
      name: "Gun NTC ADC Raw"
      entity_category: diagnostic
    gun_ntc_temp:
      name: "Gun NTC Temperature"
    # PA3 — wall-plug end NTC (incoming-AC-side cable thermistor).
    # Both gun + wall-plug NTC wires terminate at the front-block
    # connector for assembly convenience.
    ntc1_adc_raw:
      name: "Wall-Plug NTC ADC Raw"
      entity_category: diagnostic
    # PB0 — NOT a thermistor. Likely AC-mains-presence sense; raw
    # exposed for diagnostics only. The °C entity reading is
    # meaningless for a non-NTC source but kept so a future
    # hardware revision repurposing the pin would surface it.
    ntc2_adc_raw:
      name: "NTC2 ADC Raw (diag)"
      entity_category: diagnostic
    # °C computed FC41D-side via β-model (R_pull=10 kΩ pulldown,
    # R0=10 kΩ at 25 °C, β=3380). Bench-anchored 2026-05-03 against
    # ntc1 raw≈2050 ↔ 23.9 °C / 75 °F. Re-fit β on a populated
    # production unit at two anchor points. NaN (unpopulated guard
    # band) is not published — HA shows last-known instead of 0.
    ntc1_temp:
      name: "Wall-Plug Temperature"
    ntc2_temp:
      name: "NTC2 Temperature (diag, non-NTC)"
      entity_category: diagnostic
    evse_state_code:
      name: "EVSE State Code"
      entity_category: diagnostic
    j1772_state_code:
      name: "J1772 State Code"
      entity_category: diagnostic

    # BL0939 metering chip. Polled every 400 ms by safety_task.
    # Raw counts are always exposed; engineering-unit entities
    # (Mains Voltage / Current A,B / Active Power) only publish
    # once the per-chassis bl0939_*_per_raw scales below are set
    # to non-zero values. Calibrate against a Fluke + clamp at
    # one operating point and solve for the slope:
    #   bl0939_v_uv_per_raw  = round(meter_mV * 1000 / V_RMS_raw)
    #   bl0939_ia_ua_per_raw = round(meter_mA * 1000 / IA_RMS_raw)
    #   bl0939_ib_ua_per_raw = round(meter_mA * 1000 / IB_RMS_raw)
    #   bl0939_pa_mw_per_raw = round(meter_W   * 1000 / A_WATT_raw)
    bl0939_v_rms_raw:
      name: "BL0939 V_RMS Raw"
      entity_category: diagnostic
    bl0939_ia_rms_raw:
      name: "BL0939 IA_RMS Raw"
      entity_category: diagnostic
    bl0939_ib_rms_raw:
      name: "BL0939 IB_RMS Raw"
      entity_category: diagnostic
    bl0939_a_watt_raw:
      name: "BL0939 A_WATT Raw"
      entity_category: diagnostic
    mains_voltage:
      name: "Mains Voltage"
    mains_current_a:
      name: "Mains Current (Leg A)"
    mains_current_b:
      name: "Mains Current (Leg B)"
    active_power:
      name: "Active Power"
    # BL0939 measures line period directly (TPS1 register); no per-
    # chassis scale needed.
    mains_frequency:
      name: "Mains Frequency"
    # Card UID as a u32 number — sticky across card-removal so HA
    # automations / templates can compare against tag IDs without
    # racing the lift-off edge. The text-sensor "Last RFID UID" has
    # the same value in colon-formatted form.
    last_rfid_uid:
      name: "Last RFID UID Number"
    # Per-chassis raw → engineering scales.
    #
    # Voltage: bench-anchored 2026-05-04 — Fluke reads 123.9 V when
    # scale=56 displayed 119.2 V → bumped to 58 µV/raw (= 56 × 123.9 /
    # 119.2). i16 quantization gives ±0.5 V resolution at the wall.
    # Re-fit with future deployments via:
    #   bl0939_v_uv_per_raw = round(meter_mV * 1000 / V_RMS_raw)
    bl0939_v_uv_per_raw: 58
    # Current / power scales need a known load to fit (no-load IA_RMS
    # has a bias offset). Stay 0 = uncalibrated until a 1 A reference
    # load is on the bench. Solve from the load-cycle reading:
    #   bl0939_ia_ua_per_raw = round(meter_mA * 1000 / IA_RMS_raw)
    #   bl0939_pa_mw_per_raw = round(meter_W   * 1000 / A_WATT_raw)
    bl0939_ia_ua_per_raw: 0
    bl0939_ib_ua_per_raw: 0
    bl0939_pa_mw_per_raw: 0

  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

  - platform: debug
    free:
      name: "Free Memory"
      entity_category: diagnostic
    block:
      name: "Largest Free Block"
      entity_category: diagnostic
    loop_time:
      name: "Loop Time"
      entity_category: diagnostic

binary_sensor:
  - platform: openbhzd_tlv
    link_up:
      name: "MCU Link"
      entity_category: diagnostic
    vehicle_connected:
      name: "Vehicle Connected"
    charging:
      name: "Charging"
    ac_present:
      name: "AC Present"
      entity_category: diagnostic
    fault_active:
      name: "Fault Active"
    contactor_cmd:
      name: "Contactor Commanded Closed"
      entity_category: diagnostic
    rfid_present:
      name: "RFID Card Present"

text_sensor:
  - platform: openbhzd_tlv
    evse_state:
      name: "EVSE State"
    j1772_state:
      name: "J1772 State"
    first_fault:
      name: "First Fault"
    build_info:
      name: "MCU Build"
      entity_category: diagnostic
    last_rfid_uid:
      name: "Last RFID UID"

  - platform: debug
    reset_reason:
      name: "Reset Reason"
      entity_category: diagnostic

number:
  - platform: openbhzd_tlv
    advertised_amps:
      name: "Set Advertised Amps"
      entity_category: config

button:
  - platform: openbhzd_tlv
    request_stop:
      name: "Stop"
    request_start_resume:
      name: "Start"
    clear_fault_all:
      name: "Clear All Faults"
      entity_category: diagnostic
    ping:
      name: "Ping MCU"
      entity_category: diagnostic
    refresh_state:
      name: "Refresh State"
      entity_category: diagnostic
    refresh_build_info:
      name: "Refresh Build Info"
      entity_category: diagnostic
    refresh_fault_log:
      name: "Dump Fault Log"
      entity_category: diagnostic
    refresh_lifetime_kwh:
      name: "Refresh Lifetime kWh"
      entity_category: diagnostic
    buzzer_beep:
      name: "Buzzer Beep"
      buzzer_ms: 50
      entity_category: diagnostic
    # Push the four bl0939_*_per_raw scales above to the MCU's W25Q
    # calibration record. One-shot: change the YAML scale, OTA, then
    # press this button — the next boot uses the new values without a
    # re-flash. Idempotent on the MCU side (matching values are a no-op).
    push_bl0939_cal:
      name: "Push BL0939 Calibration"
      entity_category: config

# P24 drives a status LED on the FC41D module (identified 2026-05-04 by
# wiggle-test on P10/P22/P23/P24). ESPHome's status_led semantic: blinks
# slowly during WiFi/API connect, fast on component errors, OFF when
# everything is fine. Bench-observed 2026-05-04: bare `pin: P24` blinks
# at boot then goes dark, which means the LED is wired active-high
# (lit = pin HIGH = "warning"). Invert so the steady-state is "lit when
# alive" — pin LOW pulls the LED on, pin HIGH on warning blanks it
# briefly, fast-blink on error still legible.
status_led:
  pin:
    number: P24
    inverted: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:

ota:
  - platform: esphome

time:
  - platform: homeassistant
    id: ha_time
