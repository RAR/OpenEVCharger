# FC41D-side ESPHome firmware for OpenBHZD.
#
# Pairs with the safety-core firmware running on the GD32F205VG MCU
# (this repo's src/). The MCU drives all safety-critical work — J1772
# state machine, contactor control, fault latching, persistence,
# user I/O on the LED strip + buzzer + buttons + DIPs — and exports
# its full state and a small command surface over the binary TLV
# protocol from spec § 5 (see ../docs/protocol.md, ../src/proto/).
#
# This YAML runs on the FC41D module (Quectel BK7231N Wi-Fi/BLE chip,
# reflashed with LibreTiny+ESPHome). Job: speak TLV to the MCU,
# expose state to Home Assistant, take command requests back, and
# eventually carry OCPP / external scheduling. Nothing safety-bearing
# lives on this side — it can crash, reboot, or lose the network and
# the MCU keeps charging or faults safely on its own.
#
# Wiring (matches stock board):
#   BK7231N UART1 P11 (TX) → MCU UART4 PD2 (RX)
#   BK7231N UART1 P10 (RX) → MCU UART4 PC12 (TX)
#   GND bonded.
#
# First-flash + recovery procedure: see ../docs/fc41d-bring-up.md
# (and `boards/README.md` for the partition-shift rationale on this
# specific BK7231N board variant).

substitutions:
  device_name: openbhzd
  friendly_name: OpenBHZD EV Charger

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.f_cpu: 120000000L
    # FC41D's BK7231N has no flash encryption key set (eFuse = all zeros).
    # LibreTiny's Tuya variant pre-encrypts the image with the Tuya XOR
    # coefficient, expecting the chip to reverse it at read time. FC41D
    # doesn't, so override to zero coeffs → image written as plaintext.
    board_build.bkcrypt_coeffs: "00000000000000000000000000000000"
    build_flags:
      # The TLV channel is bursty: STATE_REPORT ≈ 36 B every 5 s, fault-
      # log dump up to ~16 × 38 B at once. 1 KB ring is comfortable
      # headroom over LibreTiny's 256 B default. ESPHome's
      # `uart.rx_buffer_size:` is silently ignored on bk72xx — the
      # Arduino Serial driver uses a compile-time-fixed
      # RingBufferN<LT_SERIAL_BUFFER_SIZE>.
      - -DLT_SERIAL_BUFFER_SIZE=1024

# Custom partition layout — `download` shifted to 0x132000 so the stock
# Quectel/Beken bootloader actually finds OTA images we write. JSON in
# ./boards/, symlinked into ~/.platformio/platforms/libretiny/boards/
# once at setup time (see boards/README.md).
bk72xx:
  board: generic-bk7231n-qfn32-quectel
  family: BK7231N

# UART2 (P0/P1) is the BK7231N's debug-pad UART; doesn't collide with
# UART1. Keep at DEBUG so unhandled TLV opcodes show up in the trace.
logger:
  level: DEBUG

# Surfaces free heap, largest free block, loop time, reset reason as
# diagnostic sensors.
debug:
  update_interval: 30s

# Wire to MCU UART4 (PC12 TX / PD2 RX).
uart:
  id: mcu_uart
  tx_pin: P11
  rx_pin: P10
  baud_rate: 115200

# In-tree component — this YAML lives in the OpenBHZD repo so the
# component is right next door, no git fetch needed. To pin a
# released ref later, switch to `type: git` with the OpenBHZD repo
# URL and a tag.
external_components:
  - source:
      type: local
      path: components
    components: [openbhzd_tlv]
  # OCPP 1.6J Charge Point — registers against a Central System (SteVe
  # for dev, evcc / SteVe / CitrineOS / Monta in prod). MicroOcpp under
  # the hood; GPLv3. Pin to main here; users can pin a SHA in their
  # fork.
  - source:
      type: git
      url: https://github.com/RAR/esphome-ocpp-server
      ref: main
    refresh: always
    components: [ocpp]

openbhzd_tlv:
  id: openbhzd_mcu
  uart_id: mcu_uart
  poll_interval: 5s
  link_timeout: 15s
  # RFID swipe outcomes drive the OCPP transaction lifecycle. The MCU
  # has already done local authlist matching by the time this fires —
  # OCPP layers a CSMS billing record on top, it doesn't gate the
  # contactor (the local authlist + require_rfid_auth flag do that).
  # Result codes (RFID_AUTH_RESULT_*):
  #   1 START         — matched tag, EVSE entering CHARGING
  #   2 STOP          — matched tag, EVSE exiting CHARGING (toggle stop)
  #   3 MATCHED_NOOP  — matched tag, no state-change applicable; ignore
  on_rfid_auth_result:
    - lambda: |-
        if (result == 1) {                          // START
          id(ocpp_cp)->start_transaction(x);
        } else if (result == 2) {                   // STOP (toggle)
          id(ocpp_cp)->end_transaction_with_idtag(x);
        }

sensor:
  - platform: openbhzd_tlv
    cp_high_mv:
      name: "CP High"
    # Sampled mid-LOW phase via TIMER0 CH3 trigger swap (see
    # src/hal/adc_inject.c). The OEM read divider can't resolve
    # negative voltages so cp_low_mv reads ~0 mV for any actual CP
    # negative excursion until a 5-point negative-half cal lands;
    # value is diagnostic-grade, used to confirm the LOW-phase
    # sampling path works.
    cp_low_mv:
      name: "CP Low"
      entity_category: diagnostic
    advertised_amps:
      name: "Advertised Amps"
    active_amps:
      name: "Active Amps"
    lifetime_kwh:
      name: "Lifetime Energy"
      # OpenBHZD persists this in W25Q session_log, monotonic across reboots.
    session_kwh:
      id: session_kwh_sensor
      name: "Session Energy"
    fault_count:
      name: "Active Faults"
      entity_category: diagnostic
    # PA2 — gun-cable / J1772-handle NTC. Channel was originally
    # mislabelled "AC mains voltage" until a 2026-05-03 bench
    # experiment (grounding the front-block NTC pin) zeroed PA2,
    # confirming it as the gun thermistor. The earlier
    # "Fluke @ 123.9 V → 0.06151 V/count" calibration was a
    # coincidence — disconnected NTC pin floated at a value that
    # multiplied to a plausible mains number. Real V/I sensing
    # comes from the BL0939 metering IC at U11 (see further down).
    gun_ntc_adc_raw:
      name: "Gun NTC ADC Raw"
      entity_category: diagnostic
    gun_ntc_temp:
      name: "Gun NTC Temperature"
    # PA3 — wall-plug end NTC (incoming-AC-side cable thermistor).
    # Both gun + wall-plug NTC wires terminate at the front-block
    # connector for assembly convenience.
    ntc1_adc_raw:
      name: "Wall-Plug NTC ADC Raw"
      entity_category: diagnostic
    # PB0 — NOT a thermistor. Likely AC-mains-presence sense; raw
    # exposed for diagnostics only. The °C entity reading is
    # meaningless for a non-NTC source but kept so a future
    # hardware revision repurposing the pin would surface it.
    ntc2_adc_raw:
      name: "NTC2 ADC Raw (diag)"
      entity_category: diagnostic
    # °C computed FC41D-side via β-model (R_pull=10 kΩ pulldown,
    # R0=10 kΩ at 25 °C, β=3380). Bench-anchored 2026-05-03 against
    # ntc1 raw≈2050 ↔ 23.9 °C / 75 °F. Re-fit β on a populated
    # production unit at two anchor points. NaN (unpopulated guard
    # band) is not published — HA shows last-known instead of 0.
    ntc1_temp:
      name: "Wall-Plug Temperature"
    ntc2_temp:
      name: "NTC2 Temperature (diag, non-NTC)"
      entity_category: diagnostic
    evse_state_code:
      name: "EVSE State Code"
      entity_category: diagnostic
    j1772_state_code:
      name: "J1772 State Code"
      entity_category: diagnostic

    # BL0939 metering chip. Polled every 400 ms by safety_task.
    # Raw counts are always exposed; engineering-unit entities
    # (Mains Voltage / Current A,B / Active Power) only publish
    # once the per-chassis bl0939_*_per_raw scales below are set
    # to non-zero values. Calibrate against a Fluke + clamp at
    # one operating point and solve for the slope:
    #   bl0939_v_uv_per_raw  = round(meter_mV * 1000 / V_RMS_raw)
    #   bl0939_ia_ua_per_raw = round(meter_mA * 1000 / IA_RMS_raw)
    #   bl0939_ib_ua_per_raw = round(meter_mA * 1000 / IB_RMS_raw)
    #   bl0939_pa_mw_per_raw = round(meter_W   * 1000 / A_WATT_raw)
    bl0939_v_rms_raw:
      name: "BL0939 V_RMS Raw"
      entity_category: diagnostic
    bl0939_ia_rms_raw:
      name: "BL0939 IA_RMS Raw"
      entity_category: diagnostic
    bl0939_ib_rms_raw:
      name: "BL0939 IB_RMS Raw"
      entity_category: diagnostic
    bl0939_a_watt_raw:
      name: "BL0939 A_WATT Raw"
      entity_category: diagnostic
    mains_voltage:
      id: mains_voltage_sensor
      name: "Mains Voltage"
    mains_current_a:
      id: mains_current_a_sensor
      name: "Mains Current (Leg A)"
    mains_current_b:
      name: "Mains Current (Leg B)"
    active_power:
      id: active_power_sensor
      name: "Active Power"
    # BL0939 measures line period directly (TPS1 register); no per-
    # chassis scale needed.
    mains_frequency:
      name: "Mains Frequency"
    # Card UID as a u32 number — sticky across card-removal so HA
    # automations / templates can compare against tag IDs without
    # racing the lift-off edge. The text-sensor "Last RFID UID" has
    # the same value in colon-formatted form.
    last_rfid_uid:
      id: rfid_uid_sensor
      name: "Last RFID UID Number"
    rfid_authlist_count:
      name: "RFID Authorized Tags"
      entity_category: diagnostic
    # OTA push progress — only meaningful while a push is active. Stays
    # at the last value (or 0) otherwise. Driven by the FC41D-side
    # state machine on every CHUNK_ACK.
    ota_progress:
      id: ota_progress_sensor
      name: "MCU OTA Progress"
      entity_category: diagnostic
    # Per-chassis raw → engineering scales.
    #
    # Voltage: bench-anchored 2026-05-04 — Fluke reads 123.9 V when
    # scale=56 displayed 119.2 V → bumped to 58 µV/raw (= 56 × 123.9 /
    # 119.2). i16 quantization gives ±0.5 V resolution at the wall.
    # Re-fit with future deployments via:
    #   bl0939_v_uv_per_raw = round(meter_mV * 1000 / V_RMS_raw)
    bl0939_v_uv_per_raw: 58
    # Current / power scales need a known load to fit (no-load IA_RMS
    # has a bias offset). Stay 0 = uncalibrated until a 1 A reference
    # load is on the bench. Solve from the load-cycle reading:
    #   bl0939_ia_ua_per_raw = round(meter_mA * 1000 / IA_RMS_raw)
    #   bl0939_pa_mw_per_raw = round(meter_W   * 1000 / A_WATT_raw)
    bl0939_ia_ua_per_raw: 0
    bl0939_ib_ua_per_raw: 0
    bl0939_pa_mw_per_raw: 0

  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

  - platform: debug
    free:
      name: "Free Memory"
      entity_category: diagnostic
    block:
      name: "Largest Free Block"
      entity_category: diagnostic
    loop_time:
      name: "Loop Time"
      entity_category: diagnostic

binary_sensor:
  - platform: openbhzd_tlv
    link_up:
      name: "MCU Link"
      entity_category: diagnostic
      # When the MCU comes back up after a reboot, immediately push
      # the current HA wall-clock so its system_time is fresh. Guarded
      # by ha_time.is_valid() — first boot before the FC41D has
      # synced HA's clock just no-ops.
      on_press:
        - lambda: |-
            auto now = id(ha_time).now();
            if (now.is_valid()) {
              id(openbhzd_mcu).send_set_time((uint32_t) now.timestamp);
            }
    vehicle_connected:
      id: plugged_bsensor
      name: "Vehicle Connected"
    charging:
      name: "Charging"
    ac_present:
      name: "AC Present"
      entity_category: diagnostic
    fault_active:
      name: "Fault Active"
    contactor_cmd:
      name: "Contactor Commanded Closed"
      entity_category: diagnostic
    rfid_present:
      name: "RFID Card Present"
    rfid_last_accepted:
      name: "RFID Last Tag Accepted"
    rfid_session_authorized:
      name: "RFID Session Authorized"

text_sensor:
  - platform: openbhzd_tlv
    evse_state:
      id: evse_state_tsensor
      name: "EVSE State"
    j1772_state:
      name: "J1772 State"
    first_fault:
      name: "First Fault"
    build_info:
      name: "MCU Build"
      entity_category: diagnostic
    last_rfid_uid:
      name: "Last RFID UID"
    last_auth_result:
      name: "RFID Last Auth Result"
    last_rejected_uid:
      name: "RFID Last Rejected UID"

  - platform: ocpp
    ocpp_id: ocpp_cp
    connection_state:
      name: "OCPP Connection"
      entity_category: diagnostic

  - platform: debug
    reset_reason:
      name: "Reset Reason"
      entity_category: diagnostic

number:
  - platform: openbhzd_tlv
    advertised_amps:
      name: "Set Advertised Amps"
      entity_category: config

# Toggle: ON requires a swiped & matched RFID tag before charging starts
# (J1772-A unplug clears the per-session grant). OFF reverts to start-on-
# plug-in. Persisted in W25Q boot_config; default OFF on first boot.
switch:
  - platform: openbhzd_tlv
    require_rfid_auth:
      name: "Require RFID for Charging"
      entity_category: config

button:
  - platform: openbhzd_tlv
    request_stop:
      name: "Stop"
    request_start_resume:
      name: "Start"
    clear_fault_all:
      name: "Clear All Faults"
      entity_category: diagnostic
    ping:
      name: "Ping MCU"
      entity_category: diagnostic
    refresh_state:
      name: "Refresh State"
      entity_category: diagnostic
    refresh_build_info:
      name: "Refresh Build Info"
      entity_category: diagnostic
    refresh_fault_log:
      name: "Dump Fault Log"
      entity_category: diagnostic
    refresh_lifetime_kwh:
      name: "Refresh Lifetime kWh"
      entity_category: diagnostic
    buzzer_beep:
      name: "Buzzer Beep"
      buzzer_ms: 50
      entity_category: diagnostic
    # Push the four bl0939_*_per_raw scales above to the MCU's W25Q
    # calibration record. One-shot: change the YAML scale, OTA, then
    # press this button — the next boot uses the new values without a
    # re-flash. Idempotent on the MCU side (matching values are a no-op).
    push_bl0939_cal:
      name: "Push BL0939 Calibration"
      entity_category: config
    # Arm one-shot RFID learn mode. Within 30 s, the next swiped UID
    # gets added to the W25Q-persisted authorized list. Subsequent
    # swipes of authorized tags toggle pause/resume on the EVSE.
    rfid_learn_next:
      name: "Learn Next RFID UID"
      entity_category: config
    rfid_clear_list:
      name: "Clear RFID Authorized List"
      entity_category: config
    rfid_get_list:
      name: "Refresh RFID List"
      entity_category: diagnostic
    # Abort an in-flight MCU OTA push. Safe to press at any time —
    # no-op if no push is active.
    ota_abort:
      name: "Abort MCU OTA"
      entity_category: diagnostic
    # Soft restart the MCU (SYSRESETREQ). Backup domain (RTC + BKP_DATA)
    # is preserved, so the wall clock survives if the RTC bridge is
    # working. Press logs "comms: CMD_RESTART seq=… — resetting in ~50 ms"
    # on UART3 right before reset.
    restart:
      name: "Restart MCU"
      entity_category: diagnostic

  # Local-only Phase A round-trip exerciser. Pushes a synthetic 256 B
  # blob (counter pattern); the MCU stages it to W25Q, verifies CRC,
  # and arms boot_config.pending_ota_flag. With OPENBHZD_OTA_APPLY_ENABLED=0
  # (default), next boot logs "clearing without apply" and continues
  # normally — safe to press without an SWD recovery setup. Watch the
  # "MCU OTA Progress" sensor climb to 100 and the printk on UART3:
  # `ota: COMMIT OK ... pending flag set`.
  - platform: template
    name: "MCU OTA Self-Test (256 B)"
    entity_category: diagnostic
    on_press:
      - lambda: |-
          static uint8_t blob[256];
          for (int i = 0; i < 256; ++i) blob[i] = (uint8_t) i;
          if (!id(openbhzd_mcu).start_ota_push(blob, sizeof blob)) {
            ESP_LOGW("ota", "self-test: start_ota_push refused");
          }

# P24 drives a status LED on the FC41D module (identified 2026-05-04 by
# wiggle-test on P10/P22/P23/P24). ESPHome's status_led semantic: blinks
# slowly during WiFi/API connect, fast on component errors, OFF when
# everything is fine. Bench-observed 2026-05-04: bare `pin: P24` blinks
# at boot then goes dark, which means the LED is wired active-high
# (lit = pin HIGH = "warning"). Invert so the steady-state is "lit when
# alive" — pin LOW pulls the LED on, pin HIGH on warning blanks it
# briefly, fast-blink on error still legible.
status_led:
  pin:
    number: P24
    inverted: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  # When HA finishes the API handshake the time component is
  # guaranteed to start its sync immediately — push the wall-clock to
  # the MCU as soon as it's valid. Belt-and-braces with on_time_sync,
  # which fires on the *first* valid time after a sync; this hook
  # fires per HA reconnect and catches the case where the FC41D is
  # already running but the MCU rebooted (or vice versa) and we want
  # the push without waiting for the next 30-min cron tick.
  on_client_connected:
    - lambda: |-
        auto now = id(ha_time).now();
        if (now.is_valid()) {
          id(openbhzd_mcu).send_set_time((uint32_t) now.timestamp);
        }

  # MCU-side OTA driven from HA → Developer Tools → Actions.
  #
  # Preferred path (no base64; works for the full 64 KB image cap):
  #   ESPHome: openbhzd_fetch_and_push_ota
  #     url: http://homeassistant.local:8123/local/openbhzd.bin
  # Drop the .bin into HA's /config/www/ folder first; HA serves it at
  # /local/<file>. http_request streams it down on the FC41D, then we
  # hand the body off to start_ota_push.
  #
  # Legacy path (base64 in the service payload — easy for small test
  # blobs but RAM-heavy on real images):
  #   ESPHome: openbhzd_start_ota_push
  #     image_b64: <base64 of the new openbhzd.bin>
  # Generate with `base64 -w0 build/openbhzd.bin`.
  #
  # Watch "MCU OTA Progress" climb 0..100. Abort with
  # openbhzd_abort_ota_push.
  services:
    - service: fetch_and_push_ota
      variables:
        url: string
      then:
        - lambda: |-
            // Hand-rolled HTTP fetch via LibreTiny's WiFiClient
            // (ESPHome's http_request doesn't support BK72XX+arduino).
            // Streams headers, then reads body straight into the OTA
            // state machine's buffer — peak FC41D heap = 1× image size.
            id(openbhzd_mcu).fetch_and_push_ota(url);
    - service: start_ota_push
      variables:
        image_b64: string
      then:
        - lambda: |-
            std::string s(image_b64);
            std::vector<uint8_t> bin = esphome::base64_decode(s);
            ESP_LOGI("ota", "start_ota_push: %u bytes (b64 %u chars)",
                     (unsigned) bin.size(), (unsigned) s.size());
            if (!id(openbhzd_mcu).start_ota_push(bin.data(), bin.size())) {
              ESP_LOGW("ota", "start_ota_push refused (in-flight or size out of range)");
            }
    - service: abort_ota_push
      then:
        - lambda: |-
            id(openbhzd_mcu).abort_ota_push();

ota:
  - platform: esphome

time:
  - platform: homeassistant
    id: ha_time
    # Push the freshly-synced wall-clock to the MCU on the first valid
    # sync after WiFi/HA come up.
    on_time_sync:
      then:
        - lambda: |-
            auto now = id(ha_time).now();
            if (now.is_valid()) {
              id(openbhzd_mcu).send_set_time((uint32_t) now.timestamp);
            }
    # Drift / DST correction every 30 minutes. The MCU clock is purely
    # software (ticks-based), so re-anchoring it periodically keeps it
    # within ~1 s of HA across long uptimes.
    on_time:
      - seconds: 0
        minutes: '/30'
        then:
          - lambda: |-
              auto now = id(ha_time).now();
              if (now.is_valid()) {
                id(openbhzd_mcu).send_set_time((uint32_t) now.timestamp);
              }

# OCPP 1.6J Charge Point. Set csms_url + charge_point_id via secrets
# (e.g. ws://steve.local:8180/steve/websocket/CentralSystemService/openbhzd-01).
# SmartCharging hooks the existing MCU TLV surface: on a CSMS-accepted
# StartTransaction we send Start to the MCU; on accepted StopTransaction
# we send Stop. RFID swipes that match the local authlist drive the
# OCPP transaction lifecycle from the MCU side via the EVT_RFID_AUTH_RESULT
# automation block in the openbhzd_tlv component (see lambda below).
ocpp:
  id: ocpp_cp
  csms_url: !secret ocpp_csms_url
  charge_point_id: !secret ocpp_charge_point_id
  vendor: OpenBHZD
  model: ROC001-OpenBHZD
  firmware_version: "1.0.0"
  phase: L1
  nominal_voltage: 240.0
  phase_switching_supported: false
  heartbeat_interval: 60s
  meter_value_sample_interval: 30s
  stop_txn_sampled_data:
    - Energy.Active.Import.Register
  meter_values:
    voltage: mains_voltage_sensor
    current: mains_current_a_sensor
    power: active_power_sensor
    energy: session_kwh_sensor
  status_from: evse_state_tsensor
  # Map OpenBHZD evse_state strings (see core/evse_state.h evse_state_name)
  # to OCPP 1.6J ChargePointStatus enum.
  status_mapping:
    "BOOT": Unavailable
    "SELF_TEST": Preparing
    "READY": Preparing
    "CHARGING": Charging
    "USER_PAUSED": SuspendedEVSE
    "COOLING_DOWN": SuspendedEVSE
    "FAULT": Faulted
  plugged_from: plugged_bsensor
  # CSMS-initiated start: relay request to the MCU. The MCU still gates
  # this on its own conditions (J1772 state, local fault state, RFID
  # auth gate if enabled) — CSMS Accept doesn't bypass safety.
  on_remote_start:
    - lambda: id(openbhzd_mcu)->send_request_start_resume();
  on_remote_stop:
    - lambda: id(openbhzd_mcu)->send_request_stop();
