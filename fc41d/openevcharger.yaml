# FC41D-side ESPHome firmware for OpenEVCharger.
#
# Pairs with the safety-core firmware running on the GD32F205VG MCU
# (this repo's src/). The MCU drives all safety-critical work — J1772
# state machine, contactor control, fault latching, persistence,
# user I/O on the LED strip + buzzer + buttons + DIPs — and exports
# its full state and a small command surface over the binary TLV
# protocol from spec § 5 (see ../docs/protocol.md, ../src/proto/).
#
# This YAML runs on the FC41D module (Quectel BK7231N Wi-Fi/BLE chip,
# reflashed with LibreTiny+ESPHome). Job: speak TLV to the MCU,
# expose state to Home Assistant, take command requests back, and
# eventually carry OCPP / external scheduling. Nothing safety-bearing
# lives on this side — it can crash, reboot, or lose the network and
# the MCU keeps charging or faults safely on its own.
#
# Wiring (matches stock board):
#   BK7231N UART1 P11 (TX) → MCU UART4 PD2 (RX)
#   BK7231N UART1 P10 (RX) → MCU UART4 PC12 (TX)
#   GND bonded.
#
# First-flash + recovery procedure: see ../docs/fc41d-bring-up.md
# (and `boards/README.md` for the partition-shift rationale on this
# specific BK7231N board variant).

substitutions:
  device_name: openevcharger
  friendly_name: OpenEVCharger EV Charger

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.f_cpu: 120000000L
    # FC41D's BK7231N has no flash encryption key set (eFuse = all zeros).
    # LibreTiny's Tuya variant pre-encrypts the image with the Tuya XOR
    # coefficient, expecting the chip to reverse it at read time. FC41D
    # doesn't, so override to zero coeffs → image written as plaintext.
    board_build.bkcrypt_coeffs: "00000000000000000000000000000000"
    build_flags:
      # The TLV channel is bursty: STATE_REPORT ≈ 36 B every 5 s, fault-
      # log dump up to ~16 × 38 B at once. 1 KB ring is comfortable
      # headroom over LibreTiny's 256 B default. ESPHome's
      # `uart.rx_buffer_size:` is silently ignored on bk72xx — the
      # Arduino Serial driver uses a compile-time-fixed
      # RingBufferN<LT_SERIAL_BUFFER_SIZE>.
      - -DLT_SERIAL_BUFFER_SIZE=1024

# Custom partition layout — `download` shifted to 0x132000 so the stock
# Quectel/Beken bootloader actually finds OTA images we write. JSON in
# ./boards/, symlinked into ~/.platformio/platforms/libretiny/boards/
# once at setup time (see boards/README.md).
bk72xx:
  board: generic-bk7231n-qfn32-quectel
  family: BK7231N

# UART2 (P0/P1) is the BK7231N's debug-pad UART; doesn't collide with
# UART1. Keep at DEBUG so unhandled TLV opcodes show up in the trace.
logger:
  level: DEBUG

# Surfaces free heap, largest free block, loop time, reset reason as
# diagnostic sensors.
debug:
  update_interval: 30s

# Wire to MCU UART4 (PC12 TX / PD2 RX).
uart:
  id: mcu_uart
  tx_pin: P11
  rx_pin: P10
  baud_rate: 115200

# In-tree component — this YAML lives in the OpenEVCharger repo so the
# component is right next door, no git fetch needed. To pin a
# released ref later, switch to `type: git` with the OpenEVCharger repo
# URL and a tag.
external_components:
  - source:
      type: local
      path: components
    components: [openevcharger_tlv]
  # OCPP 1.6J Charge Point — registers against a Central System (SteVe
  # for dev, evcc / SteVe / CitrineOS / Monta in prod). MicroOcpp under
  # the hood; GPLv3. Pin to main here; users can pin a SHA in their
  # fork.
  - source:
      type: git
      url: https://github.com/RAR/esphome-ocpp-server
      ref: main
    refresh: always
    components: [ocpp]

openevcharger_tlv:
  id: openevcharger_mcu
  uart_id: mcu_uart
  poll_interval: 5s
  link_timeout: 15s
  # RFID swipe outcomes drive the OCPP transaction lifecycle. The MCU
  # has already done local authlist matching by the time this fires —
  # OCPP layers a CSMS billing record on top, it doesn't gate the
  # contactor (the local authlist + require_rfid_auth flag do that).
  # Result codes (RFID_AUTH_RESULT_*):
  #   1 START         — matched tag, EVSE entering CHARGING
  #   2 STOP          — matched tag, EVSE exiting CHARGING (toggle stop)
  #   3 MATCHED_NOOP  — matched tag, no state-change applicable; ignore
  on_rfid_auth_result:
    - if:
        condition:
          lambda: 'return result == 1;'              # START
        then:
          - ocpp.start_transaction:
              id: ocpp_cp
              id_tag: !lambda 'return x;'
    - if:
        condition:
          lambda: 'return result == 2;'              # STOP (toggle)
        then:
          - ocpp.end_transaction:
              id: ocpp_cp
              id_tag: !lambda 'return x;'

sensor:
  - platform: openevcharger_tlv
    cp_high_mv:
      name: "CP High"
    # Sampled mid-LOW phase via TIMER0 CH3 trigger swap (see
    # src/hal/adc_inject.c). The OEM read divider can't resolve
    # negative voltages so cp_low_mv reads ~0 mV for any actual CP
    # negative excursion until a 5-point negative-half cal lands;
    # value is diagnostic-grade, used to confirm the LOW-phase
    # sampling path works.
    cp_low_mv:
      name: "CP Low"
      entity_category: diagnostic
    advertised_amps:
      name: "Advertised Amps"
    active_amps:
      name: "Active Amps"
    lifetime_kwh:
      name: "Lifetime Energy"
      # OpenEVCharger persists this in W25Q session_log, monotonic across reboots.
    session_kwh:
      id: session_kwh_sensor
      name: "Session Energy"
    fault_count:
      name: "Active Faults"
      entity_category: diagnostic
    # PA2 — gun-cable / J1772-handle NTC. Channel was originally
    # mislabelled "AC mains voltage" until a 2026-05-03 bench
    # experiment (grounding the front-block NTC pin) zeroed PA2,
    # confirming it as the gun thermistor. The earlier
    # "Fluke @ 123.9 V → 0.06151 V/count" calibration was a
    # coincidence — disconnected NTC pin floated at a value that
    # multiplied to a plausible mains number. Real V/I sensing
    # comes from the BL0939 metering IC at U11 (see further down).
    gun_ntc_adc_raw:
      name: "Gun NTC ADC Raw"
      entity_category: diagnostic
    gun_ntc_temp:
      name: "Gun NTC Temperature"
    # PA3 — wall-plug end NTC (incoming-AC-side cable thermistor).
    # Both gun + wall-plug NTC wires terminate at the front-block
    # connector for assembly convenience.
    ntc1_adc_raw:
      name: "Wall-Plug NTC ADC Raw"
      entity_category: diagnostic
    # PB0 — NOT a thermistor. Likely AC-mains-presence sense; raw
    # exposed for diagnostics only. The °C entity reading is
    # meaningless for a non-NTC source but kept so a future
    # hardware revision repurposing the pin would surface it.
    ntc2_adc_raw:
      name: "NTC2 ADC Raw (diag)"
      entity_category: diagnostic
    # PC5 PE-continuity sense, 12-bit. Updated every 5 s by the MCU
    # via EVT_DIAG_ADC while F10 detector tuning is open. Bench saw
    # raw≤1 with no live mains; F5 install (2026-05-07) saw raw>400
    # with mains live + EV plugged. Watch this through plug/unplug/
    # charge cycles to pin the right threshold + polarity, then
    # flip OPENEVCHARGER_PE_CONTINUITY_DETECTOR back to 1 in
    # CMakeLists.txt.
    pe_adc_raw:
      name: "PE ADC Raw (diag)"
      entity_category: diagnostic
    # °C computed FC41D-side via β-model (R_pull=10 kΩ pulldown,
    # R0=10 kΩ at 25 °C, β=3380). Bench-anchored 2026-05-03 against
    # ntc1 raw≈2050 ↔ 23.9 °C / 75 °F. Re-fit β on a populated
    # production unit at two anchor points. NaN (unpopulated guard
    # band) is not published — HA shows last-known instead of 0.
    ntc1_temp:
      name: "Wall-Plug Temperature"
    ntc2_temp:
      name: "NTC2 Temperature (diag, non-NTC)"
      entity_category: diagnostic
    evse_state_code:
      name: "EVSE State Code"
      entity_category: diagnostic
    j1772_state_code:
      name: "J1772 State Code"
      entity_category: diagnostic

    # BL0939 metering chip. Polled every 400 ms by safety_task.
    # Raw counts are always exposed; engineering-unit entities
    # (Mains Voltage / Current A,B / Active Power) only publish
    # once the per-chassis bl0939_*_per_raw scales below are set
    # to non-zero values. Calibrate against a Fluke + clamp at
    # one operating point and solve for the slope:
    #   bl0939_v_uv_per_raw  = round(meter_mV * 1000 / V_RMS_raw)
    #   bl0939_ia_na_per_raw = round(meter_mA * 1e6  / IA_RMS_raw)
    #   bl0939_ib_ua_per_raw = round(meter_mA * 1000 / IB_RMS_raw)
    #   bl0939_pa_uw_per_raw = round(meter_W  * 1e6  / A_WATT_raw)
    bl0939_v_rms_raw:
      name: "BL0939 V_RMS Raw"
      entity_category: diagnostic
    bl0939_ia_rms_raw:
      name: "BL0939 IA_RMS Raw"
      entity_category: diagnostic
    bl0939_ib_rms_raw:
      name: "BL0939 IB_RMS Raw"
      entity_category: diagnostic
    bl0939_a_watt_raw:
      name: "BL0939 A_WATT Raw"
      entity_category: diagnostic
    mains_voltage:
      id: mains_voltage_sensor
      name: "Mains Voltage"
    mains_current_a:
      id: mains_current_a_sensor
      name: "Mains Current (Leg A)"
    mains_current_b:
      name: "Mains Current (Leg B)"
    active_power:
      id: active_power_sensor
      name: "Active Power"
    # BL0939 measures line period directly (TPS1 register); no per-
    # chassis scale needed.
    #
    # Mains Frequency entity is intentionally NOT exposed.  The cal v3
    # schema (`bl0939_freq_const` field, v2→v3 migration, 12-byte
    # WRITE_BL0939_CAL TLV payload) remains in place — but the
    # underlying TPS-derived reading on this BL0939 drifts heavily with
    # die temperature (60.4 Hz cold → 68.5 Hz warm seen on the garage
    # unit with no cal change).  A single-point cal can't compensate
    # the whole drift band; the stock V1.0.066 firmware doesn't expose
    # mains frequency either, which is the giveaway.  Yank it from
    # HA so users don't see a wrong number; revisit if a multi-point
    # temperature-compensated cal is ever worth implementing.
    # Card UID as a u32 number — sticky across card-removal so HA
    # automations / templates can compare against tag IDs without
    # racing the lift-off edge. The text-sensor "Last RFID UID" has
    # the same value in colon-formatted form.
    last_rfid_uid:
      id: rfid_uid_sensor
      name: "Last RFID UID Number"
    rfid_authlist_count:
      name: "RFID Authorized Tags"
      entity_category: diagnostic
    # OTA push progress — only meaningful while a push is active. Stays
    # at the last value (or 0) otherwise. Driven by the FC41D-side
    # state machine on every CHUNK_ACK.
    ota_progress:
      id: ota_progress_sensor
      name: "MCU OTA Progress"
      entity_category: diagnostic
    # Per-chassis raw → engineering scales.
    #
    # Voltage: bench-anchored 2026-05-04 — Fluke reads 123.9 V when
    # scale=56 displayed 119.2 V → bumped to 58 µV/raw (= 56 × 123.9 /
    # 119.2). i16 quantization gives ±0.5 V resolution at the wall.
    # Re-fit with future deployments via:
    #   bl0939_v_uv_per_raw = round(meter_mV * 1000 / V_RMS_raw)
    bl0939_v_uv_per_raw: 58
    # Current / power scales need a known load to fit (no-load IA_RMS
    # has a bias offset). Solve from the load-cycle reading:
    #   bl0939_ia_na_per_raw = round(meter_mA * 1e6 / IA_RMS_raw)
    #   bl0939_pa_uw_per_raw = round(meter_W  * 1e6 / A_WATT_raw)
    #
    # F1 cal 2026-05-06 against an EVSE-tester current-pull plug, three
    # points (6 / 8 / 10 A) → ~7 µA/raw, but extrapolated 5.5% low at
    # 44 A real-EV draw 2026-05-07. F1.1 refinement: bumped IA scale
    # 7000 → 7405 nA/raw (×1.058 to land 44.4 A reported → 46.97 A
    # actual per external monitor). Cal v2 schema bumped IA semantics
    # to nA/raw for sub-µA precision (int16_t µA/raw quantised at 14%
    # which was too coarse for 6% target).
    #
    # A_WATT raw is signed-NEGATIVE on this PCB (current-sense direction
    # opposite the BL0939 expectation) — pa_uw_per_raw carries that sign
    # so raw × scale / 1e6 = positive watts. Unit is µW/raw — earlier
    # mW/raw choice quantised to i16 with ~16% error since the actual
    # scale is ~2.575 mW/raw. i16 µW/raw range is ±32767 µW/raw, plenty
    # of room.
    #
    # IB stays 0: the second BL0939 current channel reads zero across
    # all loads on this PCB — single-CT hardware, IB pin not wired.
    # mains_current_a publishing is gated on ia_na_per_raw != 0 only.
    bl0939_ia_na_per_raw: 7405
    bl0939_ib_ua_per_raw: 0
    # F5 high-current refinement 2026-05-07: bench F1 at 6/8/10 A
    # extrapolated low at 44 A real-EV draw (EVSE reported 10672.8 W
    # vs external monitor 11571 W; ratio 1.0842). New PA scale =
    # -2575 × 1.0842 = -2792.
    bl0939_pa_uw_per_raw: -2792
    # Per-chassis BL0939 line-period reference (cal v3). Formula:
    # freq_x10 = freq_const / TPS1_raw. Bench unit landed at 271900
    # (TPS≈453 at 60.02 Hz Fluke, 2026-05-04). Garage unit re-fit:
    # const=323691 reading 58.4 Hz under load (TPS=554), bumped to
    # 332544 = 323691 × (60/58.4). Note: TPS_raw drifts ±2 % with
    # internal RC ref temperature; expect ±1 Hz wobble on this sensor.
    # Set to 0 to fall back to the compiled default.
    bl0939_freq_const: 336764

  # Power-in-kW shim for OCPP. The esphome-ocpp-server external
  # component assumes ESPHome power sensors report in kW and multiplies
  # by 1000 when forwarding to OCPP (which wants W). Our active_power
  # sensor reports W (BL0939-derived), so the OCPP layer would publish
  # 1000× too high (bench-tripped 2026-05-06: 1183 W → 1,196,566 W in
  # the MeterValues frame). This template sensor wraps active_power in
  # kW so the OCPP-side ×1000 lands at the correct W value.
  # Internal-only — HA still sees Active Power in W via active_power_sensor.
  - platform: template
    id: active_power_kw_for_ocpp
    name: "Active Power (kW shim, internal)"
    internal: true
    unit_of_measurement: kW
    accuracy_decimals: 4
    update_interval: 1s
    lambda: |-
      auto v = id(active_power_sensor).state;
      if (std::isnan(v)) return 0.0f;
      return v / 1000.0f;

  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

  - platform: debug
    free:
      name: "Free Memory"
      entity_category: diagnostic
    block:
      name: "Largest Free Block"
      entity_category: diagnostic
    loop_time:
      name: "Loop Time"
      entity_category: diagnostic

binary_sensor:
  - platform: openevcharger_tlv
    link_up:
      name: "MCU Link"
      entity_category: diagnostic
      # When the MCU comes back up after a reboot, immediately push
      # the current HA wall-clock so its system_time is fresh. Guarded
      # by ha_time.is_valid() — first boot before the FC41D has
      # synced HA's clock just no-ops.
      on_press:
        - lambda: |-
            auto now = id(ha_time).now();
            if (now.is_valid()) {
              id(openevcharger_mcu).send_set_time((uint32_t) now.timestamp);
            }
        # MCU reboot without an FC41D reboot leaves charging_bsensor
        # latched at its previous value — if it was already on before
        # the MCU went down, the post-reboot publish doesn't fire its
        # on_press and the auto-start automation we run for
        # require_rfid_auth=off never re-issues StartTransaction.req,
        # which leaves evcc stuck on "Connected. Waiting for
        # authorization…" indefinitely. Re-evaluate after the MCU's
        # post-boot state has propagated. Redundant calls are safe:
        # MicroOcpp::beginTransaction returns false for an already-
        # active transaction, so we get an extra log line at worst.
        - delay: 2s
        - if:
            condition:
              and:
                - switch.is_off: require_rfid_auth_switch
                - binary_sensor.is_on: charging_bsensor
            then:
              - logger.log:
                  format: "MCU link recovered with charging+auth-off; re-firing OCPP start_transaction"
                  level: INFO
              - ocpp.start_transaction:
                  id: ocpp_cp
                  id_tag: "auto"
    vehicle_connected:
      id: plugged_bsensor
      name: "Vehicle Connected"
      # The OCPP transaction lifecycle aligns with vehicle plug/unplug,
      # NOT with charging on/off. A pause for any reason (PV smart-
      # charging, schedule, user pause, fault recovery, ramp-down for
      # over-current) only changes ChargePointStatus to SuspendedEVSE
      # via the status_from mapping; the transaction itself stays open
      # for the duration of the connection. Closing the tx prematurely
      # makes evcc throw "session terminated, please reconnect" and
      # tears down the auth state on the CSMS side.
      on_release:
        - if:
            condition:
              switch.is_off: require_rfid_auth_switch
            then:
              - ocpp.end_transaction:
                  id: ocpp_cp
                  id_tag: "auto"
                  reason: "EVDisconnected"
    charging:
      id: charging_bsensor
      name: "Charging"
      # Fire OCPP StartTransaction when the EVSE first enters CHARGING
      # in a session with require_rfid_auth=off. Without this, the CSMS
      # sees the status flip to Charging but no StartTransaction.req and
      # evcc reads the loadpoint as "waiting on auth". When
      # require_rfid_auth is ON the RFID-swipe path
      # (on_rfid_auth_result) drives StartTransaction with the matched
      # UID instead, so this stays quiet.
      #
      # Subsequent on_press calls during the same session (after a
      # PV/smart-charging pause, etc.) are no-ops — MicroOcpp's
      # beginTransaction returns false when a transaction is already
      # active, so we just get an extra log line.
      #
      # NO on_release end_transaction here: pause != session end. Only
      # vehicle_connected.on_release ends the OCPP transaction.
      on_press:
        - if:
            condition:
              switch.is_off: require_rfid_auth_switch
            then:
              - ocpp.start_transaction:
                  id: ocpp_cp
                  id_tag: "auto"
    ac_present:
      name: "AC Present"
      entity_category: diagnostic
    fault_active:
      name: "Fault Active"
    contactor_cmd:
      name: "Contactor Commanded Closed"
      entity_category: diagnostic
    rfid_present:
      name: "RFID Card Present"
    rfid_last_accepted:
      name: "RFID Last Tag Accepted"
    rfid_session_authorized:
      name: "RFID Session Authorized"

text_sensor:
  - platform: openevcharger_tlv
    evse_state:
      id: evse_state_tsensor
      name: "EVSE State"
    j1772_state:
      name: "J1772 State"
    first_fault:
      name: "First Fault"
    build_info:
      name: "MCU Build"
      entity_category: diagnostic
    last_rfid_uid:
      name: "Last RFID UID"
    last_auth_result:
      name: "RFID Last Auth Result"
    last_rejected_uid:
      name: "RFID Last Rejected UID"

  - platform: ocpp
    ocpp_id: ocpp_cp
    connection_state:
      name: "OCPP Connection"
      entity_category: diagnostic

  - platform: debug
    reset_reason:
      name: "Reset Reason"
      entity_category: diagnostic

number:
  - platform: openevcharger_tlv
    advertised_amps:
      id: advertised_amps_n
      name: "Set Advertised Amps"
      entity_category: config

# Toggle: ON requires a swiped & matched RFID tag before charging starts
# (J1772-A unplug clears the per-session grant). OFF reverts to start-on-
# plug-in. Persisted in W25Q boot_config; default OFF on first boot.
switch:
  - platform: openevcharger_tlv
    require_rfid_auth:
      id: require_rfid_auth_switch
      name: "Require RFID for Charging"
      entity_category: config

button:
  - platform: openevcharger_tlv
    request_stop:
      name: "Stop"
    request_start_resume:
      name: "Start"
    clear_fault_all:
      name: "Clear All Faults"
      entity_category: diagnostic
    ping:
      name: "Ping MCU"
      entity_category: diagnostic
    refresh_state:
      name: "Refresh State"
      entity_category: diagnostic
    refresh_build_info:
      name: "Refresh Build Info"
      entity_category: diagnostic
    refresh_fault_log:
      name: "Dump Fault Log"
      entity_category: diagnostic
    refresh_lifetime_kwh:
      name: "Refresh Lifetime kWh"
      entity_category: diagnostic
    buzzer_beep:
      name: "Buzzer Beep"
      buzzer_ms: 50
      entity_category: diagnostic
    # Push the four bl0939_*_per_raw scales above to the MCU's W25Q
    # calibration record. One-shot: change the YAML scale, OTA, then
    # press this button — the next boot uses the new values without a
    # re-flash. Idempotent on the MCU side (matching values are a no-op).
    push_bl0939_cal:
      name: "Push BL0939 Calibration"
      entity_category: config
    # Arm one-shot RFID learn mode. Within 30 s, the next swiped UID
    # gets added to the W25Q-persisted authorized list. Subsequent
    # swipes of authorized tags toggle pause/resume on the EVSE.
    rfid_learn_next:
      name: "Learn Next RFID UID"
      entity_category: config
    rfid_clear_list:
      name: "Clear RFID Authorized List"
      entity_category: config
    rfid_get_list:
      name: "Refresh RFID List"
      entity_category: diagnostic
    # Abort an in-flight MCU OTA push. Safe to press at any time —
    # no-op if no push is active.
    ota_abort:
      name: "Abort MCU OTA"
      entity_category: diagnostic
    # Soft restart the MCU (SYSRESETREQ). Backup domain (RTC + BKP_DATA)
    # is preserved, so the wall clock survives if the RTC bridge is
    # working. Press logs "comms: CMD_RESTART seq=… — resetting in ~50 ms"
    # on UART3 right before reset.
    restart:
      name: "Restart MCU"
      entity_category: diagnostic
    # CP-wake replug: drop CP to state F (-12 V) and open the contactor
    # for ~3 s, then auto-resume to READY. Forces the EV to drop
    # charging and re-handshake without a physical unplug. Useful for
    # OCPP RemoteStop+Start, recovering a stuck EV state, or bench-
    # exercising the J1772 classifier. Some older EVs (early Leaf,
    # some Ioniq) latch a fault on CP collapse and need a real unplug
    # to clear — bench-validate against the user's car before relying
    # on this for automated remote restart.
    simulate_replug:
      name: "Simulate Replug"
      entity_category: diagnostic
    # F3 bench validation: drive PE3 CAL pulse and observe PE2 GFCI
    # sense edge. ~160 ms busy-wait inside safety_task — no other
    # detector ticks during the test. MCU refuses unless EVSE=READY.
    # Watch UART3 for "self-test: GFCI CAL PASS" / FAIL with rc.
    # Scope PE3 + PE2 simultaneously the first time. Once the path
    # is bench-confirmed, flip OPENEVCHARGER_GFCI_CAL_SELF_TEST=1.
    run_gfci_cal_test:
      name: "Run GFCI CAL Self-Test"
      entity_category: diagnostic

  # Local-only Phase A round-trip exerciser. Pushes a synthetic 256 B
  # blob (counter pattern); the MCU stages it to W25Q, verifies CRC,
  # and arms boot_config.pending_ota_flag. With OPENEVCHARGER_OTA_APPLY_ENABLED=0
  # (default), next boot logs "clearing without apply" and continues
  # normally — safe to press without an SWD recovery setup. Watch the
  # "MCU OTA Progress" sensor climb to 100 and the printk on UART3:
  # `ota: COMMIT OK ... pending flag set`.
  - platform: template
    name: "MCU OTA Self-Test (256 B)"
    entity_category: diagnostic
    on_press:
      - lambda: |-
          static uint8_t blob[256];
          for (int i = 0; i < 256; ++i) blob[i] = (uint8_t) i;
          if (!id(openevcharger_mcu).start_ota_push(blob, sizeof blob)) {
            ESP_LOGW("ota", "self-test: start_ota_push refused");
          }

# P24 drives a status LED on the FC41D module (identified 2026-05-04 by
# wiggle-test on P10/P22/P23/P24). ESPHome's status_led semantic: blinks
# slowly during WiFi/API connect, fast on component errors, OFF when
# everything is fine. Bench-observed 2026-05-04: bare `pin: P24` blinks
# at boot then goes dark, which means the LED is wired active-high
# (lit = pin HIGH = "warning"). Invert so the steady-state is "lit when
# alive" — pin LOW pulls the LED on, pin HIGH on warning blanks it
# briefly, fast-blink on error still legible.
status_led:
  pin:
    number: P24
    inverted: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  # When HA finishes the API handshake the time component is
  # guaranteed to start its sync immediately — push the wall-clock to
  # the MCU as soon as it's valid. Belt-and-braces with on_time_sync,
  # which fires on the *first* valid time after a sync; this hook
  # fires per HA reconnect and catches the case where the FC41D is
  # already running but the MCU rebooted (or vice versa) and we want
  # the push without waiting for the next 30-min cron tick.
  on_client_connected:
    - lambda: |-
        auto now = id(ha_time).now();
        if (now.is_valid()) {
          id(openevcharger_mcu).send_set_time((uint32_t) now.timestamp);
        }

  # MCU-side OTA driven from HA → Developer Tools → Actions.
  #
  # Preferred path (no base64; works for the full 64 KB image cap):
  #   ESPHome: openevcharger_fetch_and_push_ota
  #     url: http://homeassistant.local:8123/local/openevcharger.bin
  # Drop the .bin into HA's /config/www/ folder first; HA serves it at
  # /local/<file>. http_request streams it down on the FC41D, then we
  # hand the body off to start_ota_push.
  #
  # Legacy path (base64 in the service payload — easy for small test
  # blobs but RAM-heavy on real images):
  #   ESPHome: openevcharger_start_ota_push
  #     image_b64: <base64 of the new openevcharger.bin>
  # Generate with `base64 -w0 build/openevcharger.bin`.
  #
  # Watch "MCU OTA Progress" climb 0..100. Abort with
  # openevcharger_abort_ota_push.
  services:
    - service: fetch_and_push_ota
      variables:
        url: string
      then:
        - lambda: |-
            // Hand-rolled HTTP fetch via LibreTiny's WiFiClient
            // (ESPHome's http_request doesn't support BK72XX+arduino).
            // Streams headers, then reads body straight into the OTA
            // state machine's buffer — peak FC41D heap = 1× image size.
            id(openevcharger_mcu).fetch_and_push_ota(url);
    - service: start_ota_push
      variables:
        image_b64: string
      then:
        - lambda: |-
            std::string s(image_b64);
            std::vector<uint8_t> bin = esphome::base64_decode(s);
            ESP_LOGI("ota", "start_ota_push: %u bytes (b64 %u chars)",
                     (unsigned) bin.size(), (unsigned) s.size());
            if (!id(openevcharger_mcu).start_ota_push(bin.data(), bin.size())) {
              ESP_LOGW("ota", "start_ota_push refused (in-flight or size out of range)");
            }
    - service: abort_ota_push
      then:
        - lambda: |-
            id(openevcharger_mcu).abort_ota_push();

ota:
  - platform: esphome

time:
  - platform: homeassistant
    id: ha_time
    # Push the freshly-synced wall-clock to the MCU on the first valid
    # sync after WiFi/HA come up.
    on_time_sync:
      then:
        - lambda: |-
            auto now = id(ha_time).now();
            if (now.is_valid()) {
              id(openevcharger_mcu).send_set_time((uint32_t) now.timestamp);
            }
    # Drift / DST correction every 30 minutes. The MCU clock is purely
    # software (ticks-based), so re-anchoring it periodically keeps it
    # within ~1 s of HA across long uptimes.
    on_time:
      - seconds: 0
        minutes: '/30'
        then:
          - lambda: |-
              auto now = id(ha_time).now();
              if (now.is_valid()) {
                id(openevcharger_mcu).send_set_time((uint32_t) now.timestamp);
              }

# OCPP 1.6J Charge Point. Set csms_url + charge_point_id via secrets
# (e.g. ws://steve.local:8180/steve/websocket/CentralSystemService/openevcharger-01).
# SmartCharging hooks the existing MCU TLV surface: on a CSMS-accepted
# StartTransaction we send Start to the MCU; on accepted StopTransaction
# we send Stop. RFID swipes that match the local authlist drive the
# OCPP transaction lifecycle from the MCU side via the EVT_RFID_AUTH_RESULT
# automation block in the openevcharger_tlv component (see lambda below).
ocpp:
  id: ocpp_cp
  csms_url: !secret ocpp_csms_url
  charge_point_id: !secret ocpp_charge_point_id
  vendor: OpenEVCharger
  model: ROC001-OpenEVCharger
  firmware_version: "2026.19.0"
  phase: L1
  nominal_voltage: 240.0
  phase_switching_supported: false
  heartbeat_interval: 60s
  meter_value_sample_interval: 30s
  stop_txn_sampled_data:
    - Energy.Active.Import.Register
  meter_values:
    voltage: mains_voltage_sensor
    current: mains_current_a_sensor
    power: active_power_kw_for_ocpp
    energy: session_kwh_sensor
    # Bind Set Advertised Amps → Current.Offered. The OCPP component
    # auto-computes Power.Offered = current_offered × voltage when both
    # are bound, so MicroOcpp's "could not find metering device for
    # Current.Offered / Power.Offered" warnings go away. SoC is a
    # vehicle-side measurand the EVSE has no source for — that warning
    # is benign and stays.
    current_offered: advertised_amps_n
  status_from: evse_state_tsensor
  # Map OpenEVCharger evse_state strings (see core/evse_state.h evse_state_name)
  # to OCPP 1.6J ChargePointStatus enum.
  status_mapping:
    "BOOT": Unavailable
    "SELF_TEST": Preparing
    "READY": Preparing
    "CHARGING": Charging
    "USER_PAUSED": SuspendedEVSE
    "COOLING_DOWN": SuspendedEVSE
    "FAULT": Faulted
  plugged_from: plugged_bsensor
  # CSMS-initiated start: relay request to the MCU. The MCU still gates
  # this on its own conditions (J1772 state, local fault state, RFID
  # auth gate if enabled) — CSMS Accept doesn't bypass safety.
  on_remote_start:
    - lambda: id(openevcharger_mcu)->send_request_start_resume();
  on_remote_stop:
    - lambda: id(openevcharger_mcu)->send_request_stop();
  # CSMS SmartCharging: SetChargingProfile-resolved limit fires here.
  # current_limit_a / power_limit_w negative = "no active constraint"
  # (no profile or all profiles expired) — leave the user's
  # advertised_amps untouched so the manual HA setting prevails.
  # limit==0 = explicit disable → MCU stop. Otherwise clamp to the
  # Number's [6,48] range and publish; advertised_amps_n's set path
  # propagates through TLV to the MCU which re-derives PWM duty.
  on_charging_profile_change:
    - lambda: |-
        if (current_limit_a == 0.0f || power_limit_w == 0.0f) {
          ESP_LOGI("ocpp", "SmartCharging disable → MCU stop");
          id(openevcharger_mcu)->send_request_stop();
          return;
        }
        float a = current_limit_a;
        if (a < 0.0f && power_limit_w > 0.0f) {
          float v = id(ocpp_cp).get_nominal_voltage();
          if (v < 1.0f) v = 240.0f;
          a = power_limit_w / v;
          ESP_LOGI("ocpp", "SmartCharging W_limit=%.1f → %.1f A (V=%.0f)",
                   power_limit_w, a, v);
        }
        if (a < 0.0f) {
          ESP_LOGD("ocpp", "SmartCharging: no constraint — keeping user setting");
          return;
        }
        if (a < 6.0f)  a = 6.0f;
        if (a > 48.0f) a = 48.0f;
        ESP_LOGI("ocpp", "SmartCharging A_limit=%.1f → advertised_amps=%.0f",
                 current_limit_a, a);
        auto call = id(advertised_amps_n).make_call();
        call.set_value(a);
        call.perform();
